<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Play chess against a strong AI engine — portfolio project" />
  <title>Chess vs Claude AI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════ HEADER ═══════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">

      <div class="logo">
        <span class="logo-icon">♟</span>
        <span class="logo-text">Chess<span class="logo-vs"> vs </span>Claude</span>
      </div>

      <div class="header-controls">
        <div class="select-wrap">
          <select id="difficulty" class="select-input" title="AI difficulty">
            <option value="2">Easy</option>
            <option value="3">Medium</option>
            <option value="5" selected>Hard</option>
          </select>
        </div>

        <button id="btn-flip"  class="btn-icon"    title="Flip board">⇅</button>
        <button id="btn-new"   class="btn-primary"  title="New game">New Game</button>
      </div>

    </div>
  </header>

  <!-- ═══════════════════════════ MAIN ════════════════════════════ -->
  <main class="main-content">
    <div class="game-layout">

      <!-- ──────────── BOARD SECTION ──────────── -->
      <section class="board-section">

        <!-- Opponent player card (top) -->
        <div class="player-card" id="player-top">
          <div class="player-avatar" id="avatar-top">🤖</div>
          <div>
            <div class="player-name"  id="name-top">Claude AI</div>
            <div class="player-title" id="title-top">Engine · Hard</div>
          </div>
          <div class="player-material" id="mat-top"></div>
        </div>

        <!-- Chess board -->
        <div class="board-container">
          <div id="board"></div>
        </div>

        <!-- Human player card (bottom) -->
        <div class="player-card" id="player-bottom">
          <div class="player-avatar" id="avatar-bottom">🧑</div>
          <div>
            <div class="player-name"  id="name-bottom">You</div>
            <div class="player-title" id="title-bottom">Player · White</div>
          </div>
          <div class="player-material" id="mat-bottom"></div>
        </div>

      </section>

      <!-- ──────────── SIDE PANEL ──────────── -->
      <aside class="side-panel">

        <!-- Status -->
        <div class="status-card" id="status-card">
          <div class="status-icon" id="status-icon">♟</div>
          <div class="status-text" id="status-text">Your turn</div>
        </div>

        <!-- Move history -->
        <div class="moves-card">
          <div class="moves-header">
            Moves
            <span class="move-count" id="move-count">0</span>
          </div>
          <div class="moves-scroll" id="moves-scroll">
            <div id="moves-list"></div>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="controls-row">
          <button id="btn-undo"   class="btn-secondary">↩ Undo</button>
          <button id="btn-resign" class="btn-danger">⚑ Resign</button>
        </div>

      </aside>

    </div>
  </main>

  <!-- ═══════════════════════ GAME OVER MODAL ═════════════════════ -->
  <div class="modal-overlay hidden" id="gameover-overlay">
    <div class="modal-card">
      <div class="modal-icon"     id="gameover-icon">🏆</div>
      <div class="modal-title"    id="gameover-title">Game Over</div>
      <div class="modal-subtitle" id="gameover-subtitle"></div>
      <div class="modal-actions">
        <button class="btn-primary btn-large" onclick="newGame()">Play Again</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════ PROMOTION MODAL ═════════════════════ -->
  <div class="modal-overlay hidden" id="promo-overlay">
    <div class="modal-card promo-card">
      <div class="modal-title">Promote Pawn</div>
      <div class="promo-choices" id="promo-choices"></div>
    </div>
  </div>

  <!-- ═════════════════════════ SCRIPTS ═══════════════════════════ -->
  <script src="js/constants.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
